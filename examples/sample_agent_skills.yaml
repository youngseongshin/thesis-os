# Example skill contracts.
skills:
  - id: alpha-evidence-builder
    agent: alpha
    purpose: "Convert source updates into evidence records."
    inputs:
      - "market data"
      - "qualitative channel update"
    outputs:
      - "evidence"
      - "research packet"
    allowed_actions:
      - "write evidence"
      - "update local db"
    forbidden_actions:
      - "make final portfolio decision"

  - id: alpha-screener
    agent: alpha
    purpose: "Generate quantitative candidates with feature snapshots."
    inputs:
      - "local market database"
      - "evidence records"
    outputs:
      - "screener candidate"
      - "screener vault note"
    allowed_actions:
      - "write screener candidates"
      - "link candidates to thesis review"
    forbidden_actions:
      - "treat candidate as final buy signal"

  - id: alpha-market-db-refresh
    agent: alpha
    purpose: "Refresh KR/US listed-equity local database snapshots after market close."
    inputs:
      - "market data adapter"
      - "KR/US listed universe"
    outputs:
      - "market snapshots"
      - "freshness note"
    allowed_actions:
      - "update local db"
      - "write freshness evidence"
    forbidden_actions:
      - "make portfolio decision"

  - id: alpha-daily-discovery-top5
    agent: alpha
    purpose: "Merge quantitative screeners, social signals, and analyst reports into a Top 5 portfolio-review queue."
    inputs:
      - "quant screener results"
      - "social/community signals"
      - "analyst report signals"
    outputs:
      - "Top 5 discovery queue"
      - "screener candidate notes"
    allowed_actions:
      - "rank candidates"
      - "route to Lattice review"
    forbidden_actions:
      - "call Top 5 a buy list"

  - id: alpha-intraday-monitor
    agent: alpha
    purpose: "Monitor holdings and watchlist names for intraday price/flow alert routing."
    inputs:
      - "intraday price events"
      - "flow events"
      - "holdings/watchlist universe"
    outputs:
      - "intraday alert"
      - "alert vault note"
    allowed_actions:
      - "route attention"
      - "write alert notes"
    forbidden_actions:
      - "execute trade"

  - id: alpha-social-collector
    agent: alpha
    purpose: "Summarize social/community channel updates into evidence-graded clusters."
    inputs:
      - "source events"
      - "watchlist"
      - "thesis registry"
    outputs:
      - "social collection summary"
      - "evidence candidates"
    allowed_actions:
      - "write summarized evidence"
      - "route noisy items to quarantine"
    forbidden_actions:
      - "store private raw messages in public outputs"
      - "treat social heat as final proof"

  - id: alpha-facebook-collector
    agent: alpha
    purpose: "Collect and summarize public or permissioned post updates."
    inputs:
      - "post metadata"
      - "allowed post text"
      - "entity map"
    outputs:
      - "source summary"
      - "evidence candidate"
    allowed_actions:
      - "write summarized source note"
      - "link to entity or theme"
    forbidden_actions:
      - "commit cookies or browser state"
      - "treat commentary as verified fact"

  - id: alpha-youtube-scout
    agent: alpha
    purpose: "Create transcript-aware video notes and thesis implications."
    inputs:
      - "video URL"
      - "transcript or subtitle"
      - "metadata fallback"
    outputs:
      - "video source note"
      - "thesis implication summary"
    allowed_actions:
      - "write transcript-confidence note"
      - "route implications to Lattice"
    forbidden_actions:
      - "claim transcript coverage when only metadata was used"

  - id: alpha-deep-alpha
    agent: alpha
    purpose: "Find non-obvious candidates from cross-source evidence and second-order effects."
    inputs:
      - "screeners"
      - "social summaries"
      - "analyst reports"
      - "local DB"
    outputs:
      - "deep alpha candidate"
      - "variant perception questions"
      - "evidence gaps"
    allowed_actions:
      - "write research candidate"
      - "request specialist analysis"
    forbidden_actions:
      - "skip evidence grading"
      - "promote directly to portfolio"

  - id: alpha-semiconductor-specialist
    agent: alpha
    purpose: "Analyze AI infrastructure, HBM, substrate, packaging, and semiconductor capex signals."
    inputs:
      - "market DB"
      - "export/import proxies"
      - "sector reports"
      - "company evidence"
    outputs:
      - "specialist evidence packet"
      - "thesis update candidate"
    allowed_actions:
      - "write specialist packet"
      - "flag attribution uncertainty"
    forbidden_actions:
      - "make final sizing decision"

  - id: alpha-top5-deep-dive
    agent: alpha
    purpose: "Build a structured deep dive for Top 5 review candidates."
    inputs:
      - "Top 5 queue"
      - "evidence records"
      - "thesis registry"
    outputs:
      - "deep dive note"
      - "action questions"
    allowed_actions:
      - "write deep dive"
      - "handoff to Lattice"
    forbidden_actions:
      - "call deep dive a buy decision"

  - id: lattice-devil-advocate
    agent: lattice
    purpose: "Challenge high-importance theses before action."
    inputs:
      - "thesis"
      - "evidence"
    outputs:
      - "red-team checklist"
      - "decision card"
    allowed_actions:
      - "recommend action"
      - "register prediction"
    forbidden_actions:
      - "execute trade"

  - id: lattice-judgment-feedback
    agent: lattice
    purpose: "Evaluate Lattice decisions/actions over fixed horizons and improve the judgment process."
    inputs:
      - "action queue"
      - "forward returns"
      - "benchmark returns"
    outputs:
      - "judgment feedback"
      - "process lesson"
    allowed_actions:
      - "classify failure mode"
      - "update judgment process notes"
    forbidden_actions:
      - "rewrite original decision after the fact"

  - id: arki-schema-lint
    agent: arki
    purpose: "Check schemas and public/private boundaries."
    inputs:
      - "repository"
      - "schemas"
    outputs:
      - "health report"
    allowed_actions:
      - "write migration note"
      - "fail CI"
    forbidden_actions:
      - "change investment thesis"

  - id: arki-wiki-index
    agent: arki
    purpose: "Build generated wiki and SSOT notes for agent retrieval."
    inputs:
      - "vault"
      - "canonical layout"
    outputs:
      - "wiki index"
      - "SSOT note"
    allowed_actions:
      - "write generated index"
      - "check canonical locations"
    forbidden_actions:
      - "rewrite source evidence"
